/* ═══════════════════════════════════════════════════════════
   SERVI ALIADOS ADMIN — PANEL PROFESIONAL PREMIUM
   Paleta: Deep Navy + Amber Gold + Electric Blue
═══════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-01] VARIABLES GLOBALES (:root)                     │
   └─────────────────────────────────────────────────────────┘ */
:root {
  --bg:          #060B17;
  --surface:     #0D1526;
  --surface2:    #131F36;
  --surface3:    #1A2845;
  --border:      #1F3055;
  --border2:     #2A3F6A;
  --accent:      #F59E0B;
  --accent-h:    #FCD34D;
  --accent-dim:  rgba(245,158,11,0.15);
  --accent-glow: 0 0 20px rgba(245,158,11,0.3);
  --blue:        #3B82F6;
  --blue-h:      #60A5FA;
  --blue-dim:    rgba(59,130,246,0.15);
  --success:     #10B981;
  --success-dim: rgba(16,185,129,0.15);
  --danger:      #EF4444;
  --danger-dim:  rgba(239,68,68,0.15);
  --warning:     #F97316;
  --warning-dim: rgba(249,115,22,0.15);
  --text:        #E2E8F0;
  --text-2:      #94A3B8;
  --text-3:      #64748B;
  --radius:      10px;
  --radius-lg:   16px;
  --shadow:      0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.6);
  --transition:  all 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
}

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-02] MAIN CONTENT WRAPPER                           │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== MAIN CONTENT WRAPPER ==================== */
#mainContent {
  flex: 1;
  margin-left: 240px;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-03] SCROLLBARS                                     │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== SCROLLBARS ==================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-04] LOGIN OVERLAY                                  │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== LOGIN OVERLAY ==================== */
#adminLogin {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 50% 0%, #0D2040 0%, var(--bg) 70%);
  z-index: 2000;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#adminLogin::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
  pointer-events: none;
}

#adminLogin > div {
  background: var(--surface2);
  padding: 36px 32px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
  width: 90%;
  max-width: 380px;
  position: relative;
  overflow: hidden;
}

#adminLogin > div::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--blue));
}

#adminLogin h3 {
  color: var(--text);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
  text-align: center;
}

#adminLogin h3::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: var(--accent);
  margin: 8px auto 24px;
  border-radius: 2px;
}

#adminLogin input {
  width: 100%;
  padding: 11px 14px;
  margin-bottom: 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--surface3);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  transition: var(--transition);
  outline: none;
}

#adminLogin input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

#adminLogin input::placeholder { color: var(--text-3); }

#adminLogin button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent), #E08B00);
  color: #0A0E1A;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: var(--transition);
}

#adminLogin button:hover {
  background: linear-gradient(135deg, var(--accent-h), var(--accent));
  box-shadow: var(--accent-glow);
  transform: translateY(-1px);
}

#loginError { color: var(--danger) !important; font-size: 13px; text-align: center; margin-top: 8px; }

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-05] SIDEBAR                                        │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== SIDEBAR ==================== */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  box-shadow: 4px 0 24px rgba(0,0,0,0.4);
  overflow-y: auto;
  overflow-x: hidden;
}

/* Sidebar brand */
.sidebar-brand {
  padding: 20px 16px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, transparent 100%);
}

.sidebar-brand-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.sidebar-brand-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--accent), #E08B00);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
  box-shadow: 0 0 12px rgba(245,158,11,0.35);
}

.sidebar-brand-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.sidebar-brand-sub {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-top: 2px;
  padding-left: 44px;
}

/* Nav label */
.sidebar-nav-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 16px 16px 6px;
  flex-shrink: 0;
}

/* Nav group */
.sidebar-nav {
  display: flex;
  flex-direction: column;
  padding: 8px 10px;
  gap: 2px;
  flex-shrink: 0;
}

.header-content-wrapper {
  display: contents;
}

.tab-btn {
  width: 100%;
  padding: 10px 12px;
  border: none;
  border-left: 3px solid transparent;
  outline: none;
  box-shadow: none;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-2);
  border-radius: 8px;
  transition: var(--transition);
  white-space: nowrap;
  letter-spacing: 0.2px;
  position: relative;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

.tab-btn .tab-icon {
  font-size: 16px;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
}

.tab-btn:hover {
  color: var(--text);
  background: rgba(255,255,255,0.05);
}

.tab-btn.active {
  color: var(--accent);
  background: var(--accent-dim);
  border-left-color: var(--accent);
}

/* Sidebar footer with logout */
.sidebar-footer {
  margin-top: auto;
  padding: 12px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#logoutBtn {
  width: 100%;
  position: static;
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 10px 12px;
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  transition: var(--transition);
  letter-spacing: 0.2px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}

#logoutBtn:hover {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-06] SECCIONES PRINCIPALES                          │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== SECCIONES PRINCIPALES ==================== */
section {
  display: none;
  padding: 24px;
  width: 100%;
  min-height: 100vh;
  box-sizing: border-box;
}

section.active {
  display: block;
  display: flex;
  flex-direction: column;
}

section h2 {
  color: var(--text);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

section h2 strong, section h2 span { color: var(--accent); }

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-07] CHAT CONTAINER                                 │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== CHAT CONTAINER ==================== */
.chat-container {
  display: flex;
  gap: 20px;
  flex-grow: 1;
}

.chat-sidebar {
  flex: 1;
  min-width: 260px;
  height: 100%;
  overflow-y: auto;
  transition: var(--transition);
  display: block;
}

.chat-box {
  flex: 2;
  min-height: 400px;
  display: none;
  flex-direction: column;
  justify-content: space-between;
  background: var(--surface2);
  padding: 16px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

#clientes.active-chat .chat-box { display: flex; }
#clientes.active-chat .chat-sidebar { min-width: 300px; }

/* ┌─────────────────────────────────────────────────────────┐
   │ [CSS-08] LISTAS DE CHAT                                 │
   └─────────────────────────────────────────────────────────┘ */
/* ==================== LISTAS DE CHAT ==================== */
.chat-list, .historial-list {
  background: var(--surface2);
  padding: 12px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  min-height: 600px;
}

.chat-list p { color: var(--text-2); }

.chat-item {
  position: relative;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: var(--transition);
  flex-wrap: wrap;
  color: var(--text);
  border-radius: 8px;
  margin-bottom: 2px;
}

.historial-item-conta
